name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,pipeline]"

      - name: Lint
        run: |
          ruff check . --line-length 120

      - name: Build ChromaDB from shipped data
        env:
          LWC_DB_PATH: ${{ github.workspace }}/lwc_db
        run: |
          lwcmcp build

      - name: Run tests
        env:
          LWC_DB_PATH: ${{ github.workspace }}/lwc_db
        run: |
          pytest tests/ -v --tb=short

      - name: Test summary
        if: always()
        run: |
          echo "Tests completed."
